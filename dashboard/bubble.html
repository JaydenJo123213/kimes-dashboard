const HALL_COLORS = {
  'Hall A': '#e94560',
  'Hall B': '#0f3460',
  'Hall C': '#533483',
  'Hall D': '#2d6a4f',
  'Hall E': '#d4770a',
  '그랜드 볼룸': '#1a7ab0',
  '기타': '#999',
};

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tip = document.getElementById('tip');
const wrap = document.getElementById('wrap');

// 좌표 범위
const xs = RAW.map(d=>d.x), ys = RAW.map(d=>d.y);
const xMin=Math.min(...xs)-30, xMax=Math.max(...xs)+30;
const yMin=Math.min(...ys)-30, yMax=Math.max(...ys)+30;
const maxScan = Math.max(...RAW.map(d=>d.scan_count));

let hiddenHalls = new Set();
let dpr = window.devicePixelRatio || 1;

function resize() {
  const w = wrap.clientWidth - 40;
  const ratio = (yMax-yMin)/(xMax-xMin);
  const h = Math.min(w * ratio, window.innerHeight * 0.75);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  draw();
}

function toCanvas(x, y) {
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  return [
    (x - xMin) / (xMax - xMin) * cw,
    ch - (y - yMin) / (yMax - yMin) * ch  // Y 반전
  ];
}

function bubbleR(scan) {
  return Math.max(3, Math.sqrt(scan / maxScan) * 28);
}

function draw() {
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  ctx.clearRect(0, 0, cw, ch);

  // 그리드
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 0.5;

  RAW.filter(d => !hiddenHalls.has(d.hall))
     .sort((a,b) => b.scan_count - a.scan_count)
     .forEach(d => {
    const [cx, cy] = toCanvas(d.x, d.y);
    const r = bubbleR(d.scan_count);
    const col = HALL_COLORS[d.hall] || '#999';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = col + 'bb';
    ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // 스캔 수 레이블 (큰 버블만)
    if (r > 14) {
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(r*0.55)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(d.scan_count.toLocaleString(), cx, cy);
    }
  });
}

// 범례
function buildLegend() {
  const halls = [...new Set(RAW.map(d=>d.hall))].sort();
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  halls.forEach(h => {
    const item = document.createElement('div');
    item.className = 'leg-item';
    item.innerHTML = `<div class="leg-dot" style="background:${HALL_COLORS[h]||'#999'}"></div><span>${h}</span>`;
    item.addEventListener('click', () => {
      if (hiddenHalls.has(h)) hiddenHalls.delete(h);
      else hiddenHalls.add(h);
      item.style.opacity = hiddenHalls.has(h) ? '0.35' : '1';
      draw();
    });
    leg.appendChild(item);
  });
  const visible = RAW.filter(d=>!hiddenHalls.has(d.hall));
  document.getElementById('stat').textContent =
    `표시 업체: ${visible.length}개 | 총 스캔: ${visible.reduce((s,d)=>s+d.scan_count,0).toLocaleString()}건`;
}

// 툴팁
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let found = null, minDist = Infinity;
  RAW.filter(d=>!hiddenHalls.has(d.hall)).forEach(d => {
    const [cx,cy] = toCanvas(d.x, d.y);
    const r = bubbleR(d.scan_count);
    const dist = Math.hypot(cx-mx, cy-my);
    if (dist < r + 4 && dist < minDist) { minDist = dist; found = d; }
  });
  if (found) {
    tip.style.display = 'block';
    tip.style.left = (e.clientX - wrap.getBoundingClientRect().left + 12) + 'px';
    tip.style.top  = (e.clientY - wrap.getBoundingClientRect().top  - 10) + 'px';
    tip.innerHTML = `<b>${found.name}</b><br>
      ${found.matched_name !== found.name ? '↔ ' + found.matched_name + '<br>' : ''}
      홀: ${found.hall}<br>
      부스: ${found.booth || '-'}<br>
      스캔 횟수: <b>${found.scan_count.toLocaleString()}건</b>`;
    canvas.style.cursor = 'pointer';
  } else {
    tip.style.display = 'none';
    canvas.style.cursor = 'crosshair';
  }
});
canvas.addEventListener('mouseleave', () => { tip.style.display='none'; });

buildLegend();
resize();
window.addEventListener('resize', resize);
</script>
